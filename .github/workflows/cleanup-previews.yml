name: Cleanup expired previews
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove expired previews
        run: |
          today=$(date +%Y-%m-%d)
          removed=""
          for slug in $(jq -r "to_entries[] | select(.value.expires <= \"$today\") | .key" previews.json); do
            rm -rf "$slug"
            removed="$removed $slug"
          done
          jq "with_entries(select(.value.expires > \"$today\"))" previews.json > tmp.json
          mv tmp.json previews.json
          echo "Removed:$removed"
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "cleanup: remove expired previews"
          git push
